<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Sistema</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
    
    body {
      font-family: 'Poppins', sans-serif;
    }
    
    .glass-effect {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .gradient-text {
      background: linear-gradient(to right, #8b5cf6, #3b82f6, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .input-field {
      transition: all 0.3s ease;
    }
    
    .input-field:focus {
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.3);
    }
    
    .floating-label {
      transition: all 0.3s ease;
    }
    
    .input-field:focus + .floating-label,
    .input-field:not(:placeholder-shown) + .floating-label {
      transform: translateY(-24px);
      font-size: 0.75rem;
      color: #8b5cf6;
    }
    
    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
    
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(139, 92, 246, 0.3);
      animation: float 15s infinite linear;
    }
    
    @keyframes float {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.5;
      }
      50% {
        transform: translateY(-20px) rotate(180deg);
        opacity: 0.8;
      }
      100% {
        transform: translateY(0) rotate(360deg);
        opacity: 0.5;
      }
    }
  </style>
</head>
<body class="bg-black min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
  <!-- Partículas de fundo -->
  <div class="particles" id="particles"></div>
  
  <!-- Container principal -->
  <div class="glass-effect rounded-2xl shadow-2xl w-full max-w-md p-8 relative z-10">
    <!-- Logo e título -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-gradient-to-r from-purple-600 to-blue-500 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-lock text-white text-xl"></i>
      </div>
      <h1 class="text-3xl font-bold gradient-text">Easy Storage</h1>
      <p class="text-gray-400 mt-2">Entre com suas credenciais para continuar</p>
    </div>
    
    <!-- Formulário de login -->
    <form id="loginForm" class="space-y-6">
      <!-- Campo de email -->
      <div class="relative">
        <input 
          id="email" 
          type="email" 
          placeholder=" "
          class="input-field w-full bg-gray-900 text-white border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-purple-500"
        >
        <label for="email" class="floating-label absolute left-4 top-3 text-gray-400 pointer-events-none">
          <i class="fas fa-envelope mr-2"></i>Email
        </label>
      </div>
      
      <!-- Campo de senha -->
      <div class="relative">
        <input 
          id="senha" 
          type="password" 
          placeholder=" "
          class="input-field w-full bg-gray-900 text-white border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-purple-500"
        >
        <label for="senha" class="floating-label absolute left-4 top-3 text-gray-400 pointer-events-none">
          <i class="fas fa-lock mr-2"></i>Senha
        </label>
        <button type="button" id="togglePassword" class="absolute right-3 top-3 text-gray-400 hover:text-white">
          <i class="fas fa-eye"></i>
        </button>
      </div>
      
      <!-- Lembrar de mim e esqueci a senha -->
      <div class="flex justify-between items-center">
        <div class="flex items-center">
          <input type="checkbox" id="remember" class="h-4 w-4 text-purple-600 focus:ring-purple-500 border-gray-700 rounded bg-gray-800">
          <label for="remember" class="ml-2 text-sm text-gray-400">Lembrar de mim</label>
        </div>
        <a href="#" class="text-sm text-purple-400 hover:text-purple-300 transition">Esqueceu a senha?</a>
      </div>
      
      <!-- Botão de login -->
      <button 
        type="button" 
        onclick="fazerLogin()"
        class="w-full bg-gradient-to-r from-purple-600 to-blue-500 text-white py-3 rounded-lg font-medium hover:from-purple-700 hover:to-blue-600 transition-all duration-300 transform hover:-translate-y-1 shadow-lg"
      >
        <i class="fas fa-sign-in-alt mr-2"></i>Entrar
      </button>
    </form>
    
    <!-- Divisor -->
    <div class="flex items-center my-6">
      <div class="flex-grow border-t border-gray-700"></div>
      <span class="mx-4 text-gray-500 text-sm">ou</span>
      <div class="flex-grow border-t border-gray-700"></div>
    </div>
    
    <!-- Login social -->
    <div class="grid grid-cols-2 gap-3 mb-6">
  <button class="flex items-center justify-center bg-gray-800 text-white py-2 rounded-lg hover:bg-gray-700 transition">
    <i class="fab fa-google text-red-400 mr-2"></i> Google
  </button>
  <button class="flex items-center justify-center bg-gray-800 text-white py-2 rounded-lg hover:bg-gray-700 transition">
    <i class="fab fa-microsoft text-blue-400 mr-2"></i> Microsoft
  </button>
</div>
    
    <!-- Link para cadastro -->
    <p class="text-center text-gray-400">
      Não tem uma conta? 
      <a href="cadastro.html" class="text-purple-400 hover:text-purple-300 font-medium transition">Cadastre-se</a>
    </p>
  </div>

  <!-- Toast de Notificação (inicialmente oculto) -->
  <div id="toast" class="hidden fixed top-4 right-4 z-50 glass-effect rounded-lg shadow-lg p-4 max-w-sm w-full mx-4 transition-all duration-300 opacity-0 transform translate-x-full">
    <div id="toastConteudo" class="flex items-center">
      <!-- Ícone e mensagem dinâmicos -->
    </div>
  </div>

  <script>
    // Elementos do DOM para toast
    const toast = document.getElementById('toast');

    // Função para mostrar Toast (notificação flutuante)
    function mostrarToast(mensagem, tipo = 'sucesso') {
      const conteudo = document.getElementById('toastConteudo');
      const icone = tipo === 'sucesso' ? '✅' : '❌';
      const corClasse = tipo === 'sucesso' ? 'text-green-400' : 'text-red-400';
      
      conteudo.innerHTML = `
        <span class="mr-3 text-xl ${corClasse}">${icone}</span>
        <span class="text-white">${mensagem}</span>
      `;
      toast.className = `fixed top-4 right-4 z-50 glass-effect rounded-lg shadow-lg p-4 max-w-sm w-full mx-4 transition-all duration-300 opacity-100 transform translate-x-0`;
      toast.classList.remove('hidden');

      // Esconde após 4 segundos
      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-x-full');
        setTimeout(() => toast.classList.add('hidden'), 300);
      }, 4000);
    }

    function fazerLogin() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;

      if (!email || !senha) {
        mostrarToast("Preencha todos os campos!", 'erro');
        return;
      }

      const usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];
      const usuario = usuarios.find(u => u.email === email && u.senha === senha);

      if (usuario) {
        mostrarToast(`Login bem-sucedido! Bem-vindo, ${usuario.nome} ✅`);
        
        // Redireciona após 2 segundos para o usuário ver o toast
        setTimeout(() => {
          window.location.href = "dashboard.html"; // vai para o menu
        }, 2000);
      } else {
        mostrarToast("Email ou senha incorretos!", 'erro');
      }
    }

    // Alternar visibilidade da senha
    document.getElementById('togglePassword').addEventListener('click', function() {
      const senhaInput = document.getElementById('senha');
      const icon = this.querySelector('i');
      
      if (senhaInput.type === 'password') {
        senhaInput.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        senhaInput.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    });

    // Criar partículas de fundo
    function criarParticulas() {
      const container = document.getElementById('particles');
      const particleCount = 20;
      
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        
        // Tamanho aleatório
        const size = Math.random() * 60 + 10;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        
        // Posição aleatória
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.top = `${Math.random() * 100}%`;
        
        // Atraso de animação aleatório
        particle.style.animationDelay = `${Math.random() * 15}s`;
        
        container.appendChild(particle);
      }
    }

    // Inicializar partículas quando a página carregar
    window.addEventListener('load', criarParticulas);
  </script>
</body>
</html>
